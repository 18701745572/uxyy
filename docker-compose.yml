# 本地开发：Postgres（与 uxyy-api/.env.example 中 DATABASE_URL 默认一致）
# 启动：docker compose up -d postgres
# 停止：docker compose down（数据保存在卷 uxyy_pgdata）

services:
  postgres:
    image: postgres:16-alpine
    container_name: uxyy-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: uxyy
    volumes:
      - uxyy_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d uxyy"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis（BullMQ / 缓存）：启用时取消注释，并在 uxyy-api/.env 中配置 REDIS_URL
  # redis:
  #   image: redis:7-alpine
  #   container_name: uxyy-redis
  #   restart: unless-stopped
  #   ports:
  #     - "6379:6379"
  #   command: redis-server --appendonly yes
  #   volumes:
  #     - uxyy_redisdata:/data

volumes:
  uxyy_pgdata: {}
  # uxyy_redisdata: {}
